<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: common-head(${formTitle})}"></head>
<body>

<div class="container">
    <h2 th:text="${formTitle}">Customer Form</h2>

    <nav th:replace="~{layout :: admin-nav}"></nav>

    <div class="form-card">
        <form th:action="@{/customers/save}" th:object="${customer}" method="post">
            <input type="hidden" th:field="*{customerId}"/>

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" th:field="*{fullName}" placeholder="Enter full name" required/>
                <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="alert-error"></span>
            </div>

            <div class="form-group">
                <label for="emailAddress">Email Address</label>
                <input type="email" id="emailAddress" th:field="*{emailAddress}" placeholder="Enter email address" required/>
                <span th:if="${#fields.hasErrors('emailAddress')}" th:errors="*{emailAddress}" class="alert-error"></span>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Save Customer</button>
                <a th:href="@{/customers}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer>
    <p style="text-align: center; margin-top: 2rem; color: #7f8c8d;">&copy; 2024 Order Inventory Management System. All rights reserved.</p>
</footer>

</body>
</html>
