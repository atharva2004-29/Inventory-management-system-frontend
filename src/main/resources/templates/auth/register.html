<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Customer Registration - Order Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/landing.css}"/>
</head>
<body>

<header>
    <h1>Order Inventory System</h1>
</header>

<div class="container">
    <div class="login-section" style="max-width: 500px;">
        <h2>Join Us</h2>
        <p>Create your customer account</p>

        <div th:if="${errorMessage}" class="error-message" style="color: #e74c3c; background: #fdf2f2; padding: 0.8rem; border-radius: 4px; margin-bottom: 1rem; border: 1px solid #f5c6cb;">
            <p th:text="${errorMessage}"></p>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post" class="login-form">
            <div class="form-group" style="text-align: left;">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" th:field="*{fullName}" placeholder="Enter your full name" required style="width: 100%; border: 1px solid #ddd; padding: 0.8rem; border-radius: 4px; margin-top: 5px;"/>
            </div>

            <div class="form-group" style="text-align: left; margin-top: 1rem;">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="emailAddress" th:field="*{emailAddress}" placeholder="Enter your email" required style="width: 100%; border: 1px solid #ddd; padding: 0.8rem; border-radius: 4px; margin-top: 5px;"/>
            </div>

            <button type="submit" style="margin-top: 1.5rem; width: 100%;">Create Account</button>
        </form>

        <div class="login-links">
            <p><a th:href="@{/login}">Already have an account? Login here</a></p>
            <p><a th:href="@{/}">Back to Home</a></p>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2024 Order Inventory Management System. All rights reserved.</p>
</footer>

</body>
</html>
