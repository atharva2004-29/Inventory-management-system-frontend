<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin Login - Order Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/landing.css}"/>
</head>
<body>

<header>
    <h1>Order Inventory System</h1>
</header>

<div class="container">
    <div class="login-section">
        <h2>Admin Login</h2>
        <p>Access the management dashboard</p>

        <div th:if="${param.error}" class="error-message" style="color: #e74c3c; background: #fdf2f2; padding: 0.8rem; border-radius: 4px; margin-bottom: 1rem; border: 1px solid #f5c6cb;">
            Invalid email or password.
        </div>
        <div th:if="${param.logout}" class="success-message" style="color: #27ae60; background: #eef9f1; padding: 0.8rem; border-radius: 4px; margin-bottom: 1rem; border: 1px solid #c3e6cb;">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <input type="email" id="username" name="username" placeholder="Admin Email" required autofocus/>
            <input type="password" id="password" name="password" placeholder="Password" required/>
            <button type="submit">Login as Admin</button>
        </form>

        <div class="login-links">
            <p><a th:href="@{/login}">Back to Customer Login</a></p>
            <p><a th:href="@{/}">Back to Home</a></p>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2024 Order Inventory Management System. All rights reserved.</p>
</footer>

</body>
</html>
