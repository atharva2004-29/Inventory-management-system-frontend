<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login - Order Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/landing.css}"/>
</head>
<body>

<header>
    <h1>Order Inventory System</h1>
</header>

<div class="container">
    <div class="login-section">
        <h2>System Login</h2>
        <p>Sign in to access your dashboard</p>

        <div th:if="${errorMessage}" class="error-message" style="color: #e74c3c; background: #fdf2f2; padding: 0.8rem; border-radius: 4px; margin-bottom: 1rem; border: 1px solid #f5c6cb;">
            <p th:text="${errorMessage}">Invalid credentials</p>
        </div>
        <div th:if="${successMessage}" class="success-message" style="color: #27ae60; background: #eef9f1; padding: 0.8rem; border-radius: 4px; margin-bottom: 1rem; border: 1px solid #c3e6cb;">
            <p th:text="${successMessage}">Success</p>
        </div>

        <!-- Customer Login Section -->
        <div id="customer-login-form">
            <h3 style="margin-bottom: 1rem; color: #34495e;">Customer Login</h3>
            <form th:action="@{/customer-login}" method="post" class="login-form">
                <input type="email" name="email" placeholder="Customer Email" required autofocus/>
                <button type="submit">Login as Customer</button>
            </form>
            <div class="login-links" style="margin-top: 1rem;">
                <p>Are you an admin? <a href="javascript:void(0)" onclick="toggleLogin()">Admin Login</a></p>
                <p style="margin-top: 0.5rem;">Don't have an account? <a th:href="@{/register}">Register here</a></p>
            </div>
        </div>

        <!-- Admin Login Section -->
        <div id="admin-login-form" style="display: none;">
            <h3 style="margin-bottom: 1rem; color: #34495e;">Admin Login</h3>
            <form th:action="@{/login}" method="post" class="login-form">
                <input type="email" name="username" placeholder="Admin Email" required/>
                <input type="password" name="password" placeholder="Password" required/>
                <button type="submit">Login as Admin</button>
            </form>
            <div class="login-links" style="margin-top: 1rem;">
                <p>Are you a customer? <a href="javascript:void(0)" onclick="toggleLogin()">Customer Login</a></p>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Order Inventory Management System. All rights reserved.</p>
</footer>

<script>
    function toggleLogin() {
        const customerForm = document.getElementById('customer-login-form');
        const adminForm = document.getElementById('admin-login-form');
        if (customerForm.style.display === 'none') {
            customerForm.style.display = 'block';
            adminForm.style.display = 'none';
        } else {
            customerForm.style.display = 'none';
            adminForm.style.display = 'block';
        }
    }

    // If there's an error from admin login, show the admin form
    if (window.location.search.includes('error')) {
        document.getElementById('customer-login-form').style.display = 'none';
        document.getElementById('admin-login-form').style.display = 'block';
    }
</script>

</body>
</html>
