<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: common-head('Browse Products')}"></head>
<body>

<div class="container">
    <h2>Browse Products</h2>

    <nav th:replace="~{layout :: customer-nav}"></nav>

    <!-- Search -->
    <form th:action="@{/customer/products}" method="get" class="actions" style="margin-bottom: 2rem;">
        <input type="text" name="search" placeholder="Search by name..." th:value="${search}" style="flex-grow: 1; min-width: 200px;"/>
        <button type="submit" class="btn btn-secondary">Search</button>
        <a th:href="@{/customer/products}" class="btn btn-secondary">Clear</a>
    </form>

    <div class="table-container">
        <table class="table">
            <thead>
            <tr>
                <th>Name</th>
                <th>Brand</th>
                <th>Colour</th>
                <th>Size</th>
                <th>Price</th>
                <th>Rating</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="7">No products found.</td>
            </tr>
            <tr th:each="product : ${products}">
                <td th:text="${product.productName}"></td>
                <td th:text="${product.brand}"></td>
                <td th:text="${product.colour}"></td>
                <td th:text="${product.size}"></td>
                <td th:text="${product.unitPrice}"></td>
                <td th:text="${product.rating}"></td>
                <td>
                    <a th:href="@{/customer/order/new(productId=${product.productId})}" class="btn btn-primary">
                        Order
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer>
    <p style="text-align: center; margin-top: 2rem; color: #7f8c8d;">&copy; 2024 Order Inventory Management System. All rights reserved.</p>
</footer>

</body>
</html>
