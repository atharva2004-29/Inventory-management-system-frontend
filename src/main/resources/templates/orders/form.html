<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: common-head(${formTitle})}"></head>
<body>

<div class="container">
    <h2 th:text="${formTitle}">Order Form</h2>

    <nav th:replace="~{layout :: admin-nav}"></nav>

    <div class="form-card">
        <form th:action="@{/orders/save}" th:object="${order}" method="post">
            <input type="hidden" th:field="*{orderId}"/>

            <div class="form-group">
                <label for="customer">Customer</label>
                <select id="customer" th:field="*{customer}" required>
                    <option value="">-- Select Customer --</option>
                    <option th:each="c : ${customers}" th:value="${c.customerId}" th:text="${c.fullName}"></option>
                </select>
                <span th:if="${#fields.hasErrors('customer')}" th:errors="*{customer}" class="alert-error"></span>
            </div>

            <div class="form-group">
                <label for="store">Store</label>
                <select id="store" th:field="*{store}" required>
                    <option value="">-- Select Store --</option>
                    <option th:each="s : ${stores}" th:value="${s.storeId}" th:text="${s.storeName}"></option>
                </select>
                <span th:if="${#fields.hasErrors('store')}" th:errors="*{store}" class="alert-error"></span>
            </div>

            <div class="form-group">
                <label for="orderTms">Order Time</label>
                <input type="datetime-local" id="orderTms" th:field="*{orderTms}" required/>
            </div>

            <div class="form-group">
                <label for="orderStatus">Status</label>
                <select id="orderStatus" th:field="*{orderStatus}" required>
                    <option value="">-- Select Status --</option>
                    <option value="OPEN">OPEN</option>
                    <option value="PAID">PAID</option>
                    <option value="SHIPPED">SHIPPED</option>
                    <option value="COMPLETE">COMPLETE</option>
                    <option value="CANCELLED">CANCELLED</option>
                    <option value="REFUNDED">REFUNDED</option>
                </select>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Save Order</button>
                <a th:href="@{/orders}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer>
    <p style="text-align: center; margin-top: 2rem; color: #7f8c8d;">&copy; 2024 Order Inventory Management System. All rights reserved.</p>
</footer>

</body>
</html>
